<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIKKE胜利女神 Wiki | GameKee风格</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin:0; background:#0f0f12; color:#eee; }
        header { background:#1a1a1e; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #c00; }
        .logo { font-size:24px; font-weight:bold; color:#ff4d4d; }
        .nav a { color:#ddd; margin:0 15px; text-decoration:none; }
        .container { max-width:1200px; margin:20px auto; padding:0 20px; }
        .banner { background: linear-gradient(135deg, #4a1a3d, #1a1a3d); padding:30px; border-radius:12px; text-align:center; margin-bottom:30px; }
        .section { margin-bottom:40px; }
        .section h2 { border-left:5px solid #ff4d4d; padding-left:15px; color:#fff; }
        .cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(180px,1fr)); gap:20px; }
        .card { background:#1f1f24; border-radius:10px; overflow:hidden; transition:0.3s; }
        .card:hover { transform:translateY(-8px); box-shadow:0 10px 20px rgba(255,77,77,0.3); }
        .card img { width:100%; height:180px; object-fit:cover; }
        .card-info { padding:12px; text-align:center; }
        .tag { background:#c00; padding:2px 8px; border-radius:4px; font-size:12px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">NIKKE 胜利女神 Wiki</div>
        <div class="nav">
            <a href="#">首页</a>
            <a href="#">妮姬图鉴</a>
            <a href="#">攻略中心</a>
            <a href="#">活动一览</a>
            <a href="#">萌新入门</a>
        </div>
    </header>

    <div class="container">
        <!-- 横幅 -->
        <div class="banner">
            <h1>《胜利女神:妮姬》中文 Wiki</h1>
            <p>最新版本更新 · 泳装灰姑娘已实装</p>
            <p style="font-size:18px; margin:15px 0;">兑换码：<strong style="color:#ff0;">WAVETOYOU2026</strong> <button onclick="copyCode()">复制</button></p>
        </div>

        <!-- 最新公告 -->
        <div class="section">
            <h2>📢 最新公告</h2>
            <ul>
                <li>【7月2日】夏日版本更新 + 泳装灰姑娘实装</li>
                <li>【最新】关于战斗相关问题的官方说明</li>
            </ul>
        </div>

        <!-- 角色图鉴 -->
        <div class="section">
            <h2>👥 妮姬图鉴</h2>
            <div class="cards">
                <div class="card">
                    <img src="https://picsum.photos/id/1015/300/200" alt="灰姑娘">
                    <div class="card-info">
                        <strong>灰姑娘：琉璃波光</strong><br>
                        <span class="tag">SSR</span> <span class="tag">火力</span>
                    </div>
                </div>
                <!-- 可以继续复制卡片添加更多角色 -->
                <div class="card">
                    <img src="https://picsum.photos/id/237/300/200" alt="角色2">
                    <div class="card-info">
                        <strong>方舟黑色游侠</strong><br>
                        <span class="tag">SSR</span> <span class="tag">狙击</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 攻略入口 -->
        <div class="section">
            <h2>📖 攻略中心</h2>
            <div class="cards">
                <div class="card"><div class="card-info"><strong>萌新3天通关攻略</strong></div></div>
                <div class="card"><div class="card-info"><strong>PVE养成一图流</strong></div></div>
                <div class="card"><div class="card-info"><strong>最新版本阵容推荐</strong></div></div>
            </div>
        </div>
    </div>

    <script>
        function copyCode() {
            alert("兑换码已复制：WAVETOYOU2026");
        }
    </script>
</body>
</html>
