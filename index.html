<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>性界大战｜官方WIKI</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
    
    body {
      font-family: 'Noto Sans SC', sans-serif;
      margin: 0;
      padding: 0;
      color: #f8d0ff;
      background: #0a0014;
    }
    header {
      background: linear-gradient(rgba(10,0,25,0.5), rgba(20,0,45,0.7)), 
                  url('https://i.imgur.com/crcOtts.jpeg') center/cover no-repeat;
      padding: 170px 20px 160px;
      text-align: center;
      background-attachment: fixed;
    }
    h1 {
      font-size: 4.6rem;
      margin: 0;
      text-shadow: 0 0 50px #ff3399;
    }
    .subtitle {
      font-size: 1.75rem;
      margin-top: 25px;
      opacity: 0.95;
    }
    .container {
      max-width: 1300px;
      margin: -110px auto 80px;
      padding: 0 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(370px, 1fr));
      gap: 30px;
    }
    .card {
      background: rgba(35, 0, 65, 0.95);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 55px rgba(0,0,0,0.65);
      transition: all 0.4s ease;
      border: 1px solid rgba(255,102,204,0.2);
    }
    .card:hover {
      transform: translateY(-18px);
      border-color: #ff66cc;
      box-shadow: 0 40px 80px rgba(255,51,153,0.35);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .card-content {
      padding: 28px;
    }
    h2 {
      color: #ffb3ff;
      margin: 0 0 14px 0;
    }
    footer {
      text-align: center;
      padding: 70px 20px;
      background: #0a0014;
      color: #cc99ff;
    }
  </style>
</head>
<body>

  <header>
    <h1>性界大战</h1>
    <p class="subtitle">官方资料站</p>
  </header>

  <div class="container">
    <div class="grid">

      <div class="card">
        <img src="https://picsum.photos/id/1011/800/300" alt="角色">
        <div class="card-content">
          <h2>👤 角色图鉴</h2>
          <p>全角色立绘、技能解析、天赋、阵容推荐、养成路线</p>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/id/201/800/300" alt="装备">
        <div class="card-content">
          <h2>⚔️ 装备 & 养成</h2>
          <p>欲能器、饰品、宝石、升星材料、套装效果</p>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/id/133/800/300" alt="世界观">
        <div class="card-content">
          <h2>🌌 世界观</h2>
          <p>绯界大陆背景、圣权会、欲魔传说、剧情线</p>
        </div>
      </div>

      <div class="card">
        <img src="https://picsum.photos/id/251/800/300" alt="攻略">
        <div class="card-content">
          <h2>🎮 攻略中心</h2>
          <p>高阶阵容、新手教学、活动打法、隐藏机制</p>
        </div>
      </div>

    </div>
  </div>

  <footer>
    © 2026 性界大战官方资料站 | 由 Grok 协助搭建<br>
    欢迎玩家提供素材，一起完善！
  </footer>

</body>
</html>
