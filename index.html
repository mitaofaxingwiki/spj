<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>性界大战丨官方资料站</title>
  <style>
    body { 
      font-family: 'Microsoft YaHei', sans-serif; 
      margin: 0; 
      padding: 0; 
      background: #0a0014; 
      color: #fff; 
    }
    .top {
      height: 520px;
      background: url('https://i.imgur.com/crcOtts.jpeg') center top / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    h1 {
      font-size: 4.5rem;
      margin: 0;
      text-shadow: 3px 3px 15px #000;
    }
    .subtitle {
      font-size: 1.65rem;
      margin-top: 15px;
      text-shadow: 2px 2px 10px #000;
    }
    .main {
      display: flex;
      max-width: 1400px;
      margin: 40px auto;
      gap: 25px;
      padding: 0 20px;
    }
    .sidebar {
      width: 260px;
      background: white;
      color: #333;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .content {
      flex: 1;
      background: white;
      color: #333;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .menu a {
      display: block;
      padding: 14px 18px;
      color: #2c003e;
      text-decoration: none;
    }
    .menu a:hover { background: #f8f0ff; }
    .card {
      background: #f8f0ff;
      padding: 22px;
      margin: 18px 0;
      border-radius: 10px;
      border-left: 6px solid #9f2ed3;
    }
  </style>
</head>
<body>

  <div class="top">
    <h1>性界大战</h1>
    <p class="subtitle">官方资料站</p>
