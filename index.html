<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>性界大战｜官方WIKI</title>
  <style>
    body {
      font-family: 'Microsoft YaHei', sans-serif;
      margin: 0;
      padding: 0;
      color: #fff;
      background: #0f001a;
    }
    header {
      background: linear-gradient(rgba(15,0,30,0.45), rgba(15,0,30,0.65)), 
                  url('https://i.imgur.com/crcOtts.jpeg') center/cover no-repeat;
      padding: 180px 20px 160px;
      text-align: center;
      background-attachment: fixed;
    }
    h1 {
      font-size: 5rem;
      margin: 0;
      text-shadow: 0 0 60px #ff3399;
      letter-spacing: 8px;
    }
    .subtitle {
      font-size: 1.85rem;
      margin-top: 20px;
      text-shadow: 0 0 30px #000;
    }
    .container {
      max-width: 1300px;
      margin: -120px auto 80px;
      padding: 0 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 30px;
    }
    .card {
      background: rgba(40, 0, 80, 0.92);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      transition: all 0.4s ease;
    }
    .card:hover {
      transform: translateY(-18px);
      box-shadow: 0 40px 80px rgba(255, 51, 153, 0.4);
    }
    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }
    .card-content {
      padding: 28px;
    }
    h2 {
      color: #ff99ff;
      margin: 0 0 16px 0;
    }
    footer {
      text-align: center;
      padding: 60px;
      background: #0a0014;
      color: #cc88ff;
    }
  </style>
</head>
