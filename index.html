<!DOCTYPE html>
<html lang="zh">
<head>

  <style>
    body { font-family: 'Microsoft YaHei', sans-serif; margin: 0; background: #f8f5ff; color: #333; }

      color: white;
      padding: 15px 20px;
      text-align: center;

    .top {

    .sidebar {
      width: 260px;
      background: white;
      padding: 20px;

      padding: 12px 15px;
      color: #2c003e;
      text-decoration: none;
      border-bottom: 1px solid #eee;
    }
    .menu a:hover { background: #f0e6ff; }
    .card {
      background: #f8f0ff;
      padding: 18px;
      margin: 15px 0;
      border-radius: 8px;
